<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaizen Capture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
  :root{
    --ink:#152238;
    --paper:#EEF3F6;
    --card:#FFFFFF;
    --before:#C1440E;
    --before-soft:#FBEAE0;
    --after:#2E7D46;
    --after-soft:#E7F2E9;
    --gold:#C99A3B;
    --text:#1A1F29;
    --muted:#4B5566;
    --line:#DCE3E9;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:16px;
    padding-bottom:120px;
  }
  .topbar{
    background:#FFFFFF;
    color:var(--text);
    padding:24px 28px 28px;
    position:relative;
    overflow:hidden;
    border-bottom:3px solid var(--gold);
  }
  .topbar::after{
    content:"";
    position:absolute;
    right:-40px; top:-40px;
    width:180px; height:180px;
    border:2px dashed rgba(201,154,59,0.30);
    border-radius:50%;
  }
  .logo-badge{
    position:absolute;
    top:16px; right:20px;
    width:56px; height:56px;
    background:#FFFFFF;
    border:1px solid var(--line);
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 2px 8px rgba(21,34,56,0.12);
    z-index:2;
    padding:6px;
  }
  .logo-badge img{
    width:100%;
    height:100%;
    object-fit:contain;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:13.5px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:#A0721D;
    margin-bottom:6px;
    font-weight:600;
  }
  .topbar h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:31px;
    margin:0 0 18px;
    font-weight:700;
    color:var(--ink);
  }
  .meta-row{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    position:relative;
    z-index:1;
    padding-right:64px;
  }
  .meta-field{
    display:flex;
    flex-direction:column;
    gap:5px;
    min-width:180px;
    flex:1;
  }
  .meta-field label{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:600;
  }
  .meta-field input{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:6px;
    padding:10px 11px;
    color:var(--text);
    font-size:16px;
    font-weight:600;
    font-family:'Inter',sans-serif;
  }
  .meta-field input:focus{
    outline:2px solid var(--gold);
    outline-offset:1px;
    background:#FFFFFF;
  }
  .meta-field input::placeholder{color:#9AA4B2; font-weight:400;}


  .board{
    max-width:1180px;
    margin:28px auto 0;
    padding:0 24px;
    display:grid;
    grid-template-columns:1fr 56px 1fr;
    gap:0;
    align-items:start;
  }
  @media (max-width:860px){
    .board{grid-template-columns:1fr;}
    .divider{display:none;}
  }

  .panel{
    background:var(--card);
    border-radius:14px;
    box-shadow:0 1px 3px rgba(28,36,48,0.08), 0 8px 24px -12px rgba(28,36,48,0.15);
    overflow:hidden;
    border:1px solid var(--line);
  }
  .panel-head{
    padding:16px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    color:#fff;
  }
  .panel.before .panel-head{background:var(--before);}
  .panel.after .panel-head{background:var(--after);}
  .panel-head h2{
    font-family:'Space Grotesk',sans-serif;
    font-size:18px;
    margin:0;
    letter-spacing:.03em;
    text-transform:uppercase;
  }
  .panel-head span{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    opacity:.9;
  }

  .photo-zone{
    margin:18px 20px 0;
    border-radius:10px;
    height:220px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    background-size:cover;
    background-position:center;
    transition:filter .15s ease;
  }
  .panel.before .photo-zone{background-color:var(--before-soft); border:1.5px dashed #E0A57F;}
  .panel.after .photo-zone{background-color:var(--after-soft); border:1.5px dashed #9BC7A6;}
  .photo-zone:hover{filter:brightness(0.97);}
  .photo-zone.has-photo{border-style:solid;}
  .photo-zone .placeholder{
    text-align:center;
    color:var(--muted);
    font-size:14.5px;
    padding:0 20px;
  }
  .photo-zone .placeholder strong{
    display:block;
    font-family:'Space Grotesk',sans-serif;
    font-size:16px;
    color:var(--text);
    margin-bottom:4px;
  }
  .photo-zone input{display:none;}
  .retake{
    position:absolute;
    bottom:8px; right:8px;
    background:rgba(21,34,56,0.8);
    color:#fff;
    font-size:12px;
    font-family:'IBM Plex Mono',monospace;
    padding:5px 9px;
    border-radius:6px;
  }

  .datetime-row{
    display:flex;
    gap:12px;
    margin:16px 20px 0;
  }
  .dt-field{flex:1;}
  .dt-field label{
    display:block;
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    letter-spacing:.07em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:5px;
  }
  .dt-field label .hint{
    text-transform:none;
    letter-spacing:0;
    color:#B07A1E;
    font-weight:600;
  }
  .dt-field input{
    width:100%;
    padding:10px 11px;
    border-radius:7px;
    border:1px solid var(--line);
    font-family:'IBM Plex Mono',monospace;
    font-size:15px;
    color:var(--text);
    background:var(--paper);
  }
  .panel.before .dt-field input:focus{outline:2px solid var(--before);}
  .panel.after .dt-field input:focus{outline:2px solid var(--after);}

  .situation{
    margin:16px 20px 20px;
  }
  .situation label{
    display:block;
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    letter-spacing:.07em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:6px;
  }
  .situation textarea{
    width:100%;
    min-height:110px;
    resize:vertical;
    border-radius:8px;
    border:1px solid var(--line);
    padding:11px 13px;
    font-family:'Inter',sans-serif;
    font-size:15.5px;
    line-height:1.55;
    color:var(--text);
  }
  .panel.before .situation textarea:focus{outline:2px solid var(--before);}
  .panel.after .situation textarea:focus{outline:2px solid var(--after);}

  .divider{
    display:flex;
    align-items:center;
    justify-content:center;
    height:100%;
    min-height:520px;
  }
  .divider .arrow{
    writing-mode:vertical-rl;
    color:#B07A1E;
    font-family:'Space Grotesk',sans-serif;
    font-size:13px;
    letter-spacing:.2em;
    text-transform:uppercase;
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:600;
  }
  .divider svg{flex-shrink:0;}

  .footbar{
    position:fixed;
    bottom:0; left:0; right:0;
    background:var(--ink);
    padding:16px 24px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:16px;
    box-shadow:0 -6px 20px rgba(0,0,0,0.15);
    z-index:10;
  }
  #status{
    color:#D3D9E2;
    font-family:'IBM Plex Mono',monospace;
    font-size:13.5px;
  }
  #downloadBtn{
    background:var(--gold);
    color:#152238;
    border:none;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:16px;
    padding:13px 28px;
    border-radius:8px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    transition:transform .1s ease, background .15s ease;
  }
  #downloadBtn:hover{background:#DCAE54;}
  #downloadBtn:active{transform:scale(0.98);}
  #downloadBtn:disabled{background:#5b5f66;color:#aaa;cursor:progress;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-badge"><img id="logoImg" src="" alt="Company logo"></div>
  <div class="eyebrow">Continuous Improvement Record</div>
  <h1>Kaizen Capture</h1>
  <div class="meta-row">
    <div class="meta-field">
      <label>Kaizen Title</label>
      <input type="text" id="kaizenTitle" placeholder="e.g. Reduced changeover time on Line 3">
    </div>
    <div class="meta-field">
      <label>Kaizen No.</label>
      <input type="text" id="kaizenNo">
    </div>
    <div class="meta-field">
      <label>Prepared By</label>
      <input type="text" id="preparedBy" placeholder="Name">
    </div>
    <div class="meta-field">
      <label>Plant</label>
      <input type="text" id="plant" placeholder="e.g. Plant 2">
    </div>
    <div class="meta-field">
      <label>Department</label>
      <input type="text" id="department" placeholder="e.g. Assembly">
    </div>
    <div class="meta-field">
      <label>Area</label>
      <input type="text" id="area" placeholder="e.g. Line 3">
    </div>
  </div>
</div>

<div class="board">

  <div class="panel before">
    <div class="panel-head">
      <h2>Before</h2>
      <span>Problem</span>
    </div>

    <div class="photo-zone" id="beforeZone">
      <div class="placeholder">
        <strong>Add before photo</strong>
        Tap to capture or upload
      </div>
      <div class="retake" style="display:none;">Change photo</div>
      <input type="file" id="beforePhotoInput" accept="image/*" capture="environment">
    </div>

    <div class="datetime-row">
      <div class="dt-field">
        <label>Before Date</label>
        <input type="text" id="beforeDate" placeholder="dd-mmm-yy">
      </div>
      <div class="dt-field">
        <label>Before Time <span class="hint">(24-hr)</span></label>
        <input type="text" id="beforeTime" placeholder="hh:mm">
      </div>
    </div>

    <div class="situation">
      <label>Before Situation — Problem</label>
      <textarea id="beforeText" placeholder="Describe the problem observed..."></textarea>
    </div>
  </div>

  <div class="divider">
    <div class="arrow">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="writing-mode:horizontal-tb; transform:rotate(90deg);">
        <path d="M4 12h14M14 6l6 6-6 6" stroke="#C99A3B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Improvement
    </div>
  </div>

  <div class="panel after">
    <div class="panel-head">
      <h2>After</h2>
      <span>Solution</span>
    </div>

    <div class="photo-zone" id="afterZone">
      <div class="placeholder">
        <strong>Add after photo</strong>
        Tap to capture or upload
      </div>
      <div class="retake" style="display:none;">Change photo</div>
      <input type="file" id="afterPhotoInput" accept="image/*" capture="environment">
    </div>

    <div class="datetime-row">
      <div class="dt-field">
        <label>After Date</label>
        <input type="text" id="afterDate" placeholder="dd-mmm-yy">
      </div>
      <div class="dt-field">
        <label>After Time <span class="hint">(24-hr)</span></label>
        <input type="text" id="afterTime" placeholder="hh:mm">
      </div>
    </div>

    <div class="situation" style="margin-top:16px;">
      <label>After Situation — Solution</label>
      <textarea id="afterText" placeholder="Describe the improvement / result..."></textarea>
    </div>
  </div>

</div>

<div class="footbar">
  <span id="status">Ready</span>
  <button id="downloadBtn">⬇ Download as PPT</button>
</div>

  // ---- Auto-fill date & time on load (editable) ----
  function pad(n){return n.toString().padStart(2,'0');}
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function formatDateDMY(d){
    return `${pad(d.getDate())}-${MONTHS[d.getMonth()]}-${(d.getFullYear()%100).toString().padStart(2,'0')}`;
  }
  function formatTime24(d){
    return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  const now = new Date();
  document.getElementById('beforeDate').value = formatDateDMY(now);
  document.getElementById('beforeTime').value = formatTime24(now);

  document.getElementById('kaizenNo').value =
    'KZN-' + now.getFullYear() + pad(now.getMonth()+1) + pad(now.getDate()) +
    '-' + pad(now.getHours()) + pad(now.getMinutes()) + pad(now.getSeconds());

  // ---- Photo capture logic ----
  const photoData = { before: null, after: null };

  function wirePhotoZone(zoneId, inputId, key){
    const zone = document.getElementById(zoneId);
    const input = document.getElementById(inputId);
    zone.addEventListener('click', () => input.click());
    input.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        photoData[key] = ev.target.result;
        zone.style.backgroundImage = `url(${ev.target.result})`;
        zone.classList.add('has-photo');
        zone.querySelector('.placeholder').style.display = 'none';
        zone.querySelector('.retake').style.display = 'block';
      };
      reader.readAsDataURL(file);
    });
  }
  wirePhotoZone('beforeZone','beforePhotoInput','before');
  wirePhotoZone('afterZone','afterPhotoInput','after');

  // ---- PPT export ----
  document.getElementById('downloadBtn').addEventListener('click', async () => {
    const btn = document.getElementById('downloadBtn');
    const status = document.getElementById('status');
    btn.disabled = true;
    status.textContent = 'Building PPT...';

    if (typeof PptxGenJS === 'undefined') {
      status.textContent = 'PPT library failed to load — check your internet connection and retry';
      btn.disabled = false;
      return;
    }

    try{
      const pptx = new PptxGenJS();
      pptx.defineLayout({ name:'KAIZEN', width:13.33, height:7.5 });
      pptx.layout = 'KAIZEN';
      const slide = pptx.addSlide();
      slide.background = { color:'F7F5F1' };

      const title = document.getElementById('kaizenTitle').value || 'Untitled Kaizen';
      const kaizenNo = document.getElementById('kaizenNo').value;
      const preparedBy = document.getElementById('preparedBy').value;
      const plant = document.getElementById('plant').value;
      const department = document.getElementById('department').value;
      const area = document.getElementById('area').value;

      // Header bar (light background, high-contrast dark text)
      slide.addShape('rect', { x:0, y:0, w:13.33, h:1.55, fill:{color:'FFFFFF'}, line:{type:'none'} });
      slide.addShape('rect', { x:0, y:1.52, w:13.33, h:0.03, fill:{color:'C99A3B'}, line:{type:'none'} });
      slide.addText('KAIZEN CAPTURE', { x:0.4, y:0.12, w:8, h:0.3, fontFace:'Georgia', fontSize:12, color:'A0721D', bold:true, charSpacing:2 });
      slide.addText(title, { x:0.4, y:0.42, w:8.3, h:0.55, fontFace:'Georgia', fontSize:26, bold:true, color:'152238' });

      const tagLine = [
        plant ? `Plant: ${plant}` : null,
        department ? `Dept: ${department}` : null,
        area ? `Area: ${area}` : null
      ].filter(Boolean).join('        ');
      slide.addText(tagLine, { x:0.4, y:1.05, w:8.3, h:0.4, fontFace:'Courier New', fontSize:14, bold:true, color:'4B5566' });

      slide.addText(`${kaizenNo}${preparedBy ? '\n' + preparedBy : ''}`, {
        x:8.6, y:0.12, w:3.1, h:1.3, fontFace:'Courier New', fontSize:13, bold:true, color:'4B5566', align:'right', valign:'bottom', lineSpacingMultiple:1.3
      });

      // Logo badge, top-right corner (small, replace LOGO_DATA_URL above to swap)
      slide.addShape('roundRect', { x:12.05, y:0.30, w:0.95, h:0.95, rectRadius:0.12, fill:{color:'FFFFFF'}, line:{color:'DCE3E9', width:1} });
      slide.addImage({ data: LOGO_DATA_URL, x:12.17, y:0.42, w:0.71, h:0.71, sizing:{ type:'contain', w:0.71, h:0.71 } });

      const colW = 5.85, gap = 0.33, top = 1.75, left1 = 0.4, left2 = left1 + colW + gap;

      function buildColumn(x, label, accent, accentSoft, dateVal, timeVal, text, photo){
        // header
        slide.addShape('rect', { x, y: top, w: colW, h: 0.5, fill:{color: accent}, line:{type:'none'} });
        slide.addText(label, { x: x+0.15, y: top, w: colW-0.3, h:0.5, fontFace:'Georgia', bold:true, fontSize:14, color:'FFFFFF', valign:'middle', charSpacing:1 });

        // photo area
        const photoY = top + 0.55, photoH = 3.0;
        if(photo){
          slide.addImage({ data: photo, x, y: photoY, w: colW, h: photoH, sizing:{ type:'contain', w: colW, h: photoH } });
          slide.addShape('rect', { x, y: photoY, w: colW, h: photoH, line:{ color: accent, width:1 }, fill:{type:'none'} });
        } else {
          slide.addShape('rect', { x, y: photoY, w: colW, h: photoH, fill:{color: accentSoft}, line:{color: accent, width:1, dashType:'dash'} });
          slide.addText('No photo added', { x, y: photoY, w: colW, h: photoH, align:'center', valign:'middle', fontFace:'Arial', fontSize:12, color:'8A8A8A', italic:true });
        }

        // date/time (Before side only)
        let cursorY = photoY + photoH + 0.12;
        if(dateVal !== null){
          slide.addText(`Date: ${dateVal || '—'}      Time: ${timeVal || '—'} hrs`, {
            x, y: cursorY, w: colW, h:0.3, fontFace:'Courier New', fontSize:11, color:'555555'
          });
          cursorY += 0.35;
        }

        // situation text
        slide.addText(text || '—', {
          x, y: cursorY, w: colW, h: 7.5 - cursorY - 0.3,
          fontFace:'Arial', fontSize:12.5, color:'232323', valign:'top', lineSpacingMultiple:1.2,
          fill:{color:'FFFFFF'}, line:{color:'E3DFD6', width:1}, margin:[8,8,8,8]
        });
      }

      buildColumn(
        left1, 'BEFORE — PROBLEM', 'C1440E', 'FBEAE0',
        document.getElementById('beforeDate').value,
        document.getElementById('beforeTime').value,
        document.getElementById('beforeText').value,
        photoData.before
      );

      buildColumn(
        left2, 'AFTER — SOLUTION', '2E7D46', 'E7F2E9',
        document.getElementById('afterDate').value,
        document.getElementById('afterTime').value,
        document.getElementById('afterText').value,
        photoData.after
      );

      const safeName = (title || 'kaizen').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
      await pptx.writeFile({ fileName: `kaizen-${safeName || 'record'}.pptx` });
      status.textContent = 'Downloaded ✓';
    } catch(err){
      console.error(err);
      status.textContent = 'Error — see console';
    } finally {
      btn.disabled = false;
      setTimeout(() => status.textContent = 'Ready', 3000);
    }
  });
</script>

</body>
</html>
